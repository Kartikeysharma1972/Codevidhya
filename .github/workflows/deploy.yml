name: Deploy to AWS

# Render-style auto-deploy: every push to main SSHes into the EC2 box and runs
# the existing deploy script (git pull → build all 4 apps → nginx → pm2 reload).
# Can also be triggered by hand from the Actions tab (workflow_dispatch).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-aws
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "==> Fetching latest main"
            git fetch origin main
            # Live data (*.db), uploads/, .venv and .env files are all gitignored,
            # so a hard reset only updates source — it never touches real data.
            git reset --hard origin/main
            echo "==> Running deploy script"
            bash deploy/aws/deploy-apps.sh
