# Codevidhya — nginx front for the portal on port 80.
# The portal (port 4000) is the only app fronted by nginx; the three sub-apps
# are reached by the browser directly on ports 5000 / 5001 / 8001.
# When you add a real domain + SSL, switch this to per-subdomain server blocks
# and run certbot (see deploy/aws/README.md).
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;   # PDF / document uploads

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
