# Codevidhya — nginx front.
#
# The portal is fronted on the main domain. Each sub-app gets its own subdomain
# so the browser can load it over HTTPS inside the portal's iframe (loading an
# http://IP:port app from an https page is blocked as mixed content).
#
# DOMAIN SETUP (do once on the server):
#   1. Add DNS A records pointing all four hostnames at this server's IP:
#        cvtutor.codevidhya.com      (portal)
#        aitutor.codevidhya.com      (student / AI Tutor      -> :5000)
#        classroom.codevidhya.com    (teacher / Classroom AI  -> :8001)
#        admin.codevidhya.com        (admin                   -> :5001)
#   2. Enable HTTPS for all four at once:
#        sudo certbot --nginx -d cvtutor.codevidhya.com -d aitutor.codevidhya.com \
#             -d classroom.codevidhya.com -d admin.codevidhya.com
#      certbot rewrites these blocks to listen on 443 with the cert and adds the
#      http->https redirect automatically.
#   3. Set STUDENT_PUBLIC_URL / TEACHER_PUBLIC_URL / ADMIN_PUBLIC_URL in
#      secrets.env to the https:// subdomains, then re-run deploy-apps.sh.
#
# NOTE: deploy-apps.sh copies this file over the server config on every run. If
# you have already run certbot, re-running deploy resets nginx to plain HTTP —
# just re-run the certbot command above afterwards to restore SSL.

# Map each hostname to its upstream port. Unknown hosts (e.g. the raw IP) fall
# back to the portal.
map $host $cv_upstream {
    default                     127.0.0.1:4000;   # portal
    aitutor.codevidhya.com      127.0.0.1:5000;   # AI Tutor (student)
    classroom.codevidhya.com    127.0.0.1:8001;   # Classroom AI (teacher)
    admin.codevidhya.com        127.0.0.1:5001;   # Admin
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name cvtutor.codevidhya.com aitutor.codevidhya.com classroom.codevidhya.com admin.codevidhya.com _;

    client_max_body_size 25m;   # PDF / document uploads

    location / {
        proxy_pass http://$cv_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
